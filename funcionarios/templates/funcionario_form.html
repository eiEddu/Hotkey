{% extends 'index.html' %}
{% load django_bootstrap5 %}

{% block content %}
<div class="container mt-5">
    <div class="card shadow m-3 col-md-8 mx-auto border-dark">
        <div class="card-header bg-dark text-gold text-center">
            <h3 class="m-0"><i class="fas fa-user-plus"></i> Cadastro de Funcionários</h3>
        </div>
        <div class="card-body bg-light">
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                {% bootstrap_form form %}
                
                <div class="text-end mt-4">
                    <button class="btn btn-gold" type="submit"><i class="fas fa-save"></i> Salvar</button>
                    <a href="{% url 'funcionarios' %}" class="btn btn-dark text-white" type="button">
                        <span class="text">Cancelar</span>
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
