{% extends 'index.html' %}
{% load django_bootstrap5 %}

{% block content %}
<div class="container mt-5">
    <div class="card shadow m-3 col-md-8 mx-auto border-dark">
        <div class="card-header bg-dark text-gold text-center">
            <h3 class="m-0"><i class="fas fa-hand-holding"></i> Novo Empréstimo</h3>
        </div>
        <div class="card-body bg-light">
            <div class="alert alert-info small mb-4">
                <i class="fas fa-info-circle"></i> Selecione o cliente e a reserva. O sistema buscará a primeira chave disponível e definirá as datas automaticamente.
            </div>

            <form method="POST">
                {% csrf_token %}
                {% bootstrap_form form %}

                <div class="text-end mt-4">
                    <button class="btn btn-gold" type="submit"><i class="fas fa-save"></i> Confirmar e Gerar Chave</button>
                    <a href="{% url 'emprestimos' %}" class="btn btn-dark text-white">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
