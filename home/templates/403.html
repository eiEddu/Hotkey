{% extends 'index.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-danger mt-5">
                <div class="card-header bg-danger text-white text-center py-3">
                    <h4 class="mb-0"><i class="fas fa-ban"></i> Acesso Negado</h4>
                </div>
                <div class="card-body text-center bg-light p-5">
                    <i class="fas fa-lock text-danger fa-4x mb-4 opacity-75"></i>
                    <h5 class="text-dark">Controle de permissões</h5>
                    <p class="text-muted mt-3">Você não tem permissão para acessar o módulo <strong>{{ exception }}</strong> no sistema.</p>
                    <a href="{% url 'index' %}" class="btn btn-dark mt-4 px-4">
                        <i class="fas fa-arrow-left text-gold"></i> Voltar ao Início
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
