{% extends 'index.html' %}
{% load django_bootstrap5 %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <!-- Adicionado overflow-hidden para cortar o fundo interno e border para o contorno -->
            <div class="card shadow-lg border border-dark rounded-4 overflow-hidden mt-5">
                <div class="card-header bg-dark text-center py-4 border-bottom border-warning border-3">
                    <i class="fas fa-key text-gold fa-3x mb-2"></i>
                    <h3 class="text-white mb-0 fw-bold" style="letter-spacing: 2px;">HOTKEY</h3>
                    <p class="text-gold small mb-0">Acesso Restrito</p>
                </div>
                <div class="card-body bg-light p-4 p-sm-5">
                    <form method="POST">
                        {% csrf_token %}
                        {% bootstrap_form form %}
                        <div class="d-grid mt-4">
                            <button class="btn btn-gold btn-lg fw-bold shadow-sm" type="submit">
                                <i class="fas fa-sign-in-alt"></i> Entrar no Sistema
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
